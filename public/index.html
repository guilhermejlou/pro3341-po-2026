<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PRO3341 – Projeto PO 2026 | Poli-USP</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#0f1117;--surface:#1a1d2e;--border:#2d3148;--text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--green:#4ade80;--gbg:#0f2d1f;--gborder:#166534;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
    .h-left{display:flex;flex-direction:column;gap:2px;}
    .h-title{font-size:13px;font-weight:600;color:#f1f5f9;}
    .h-sub{font-size:11px;color:var(--muted);}
    .h-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .badge{display:flex;align-items:center;gap:5px;background:var(--gbg);border:1px solid var(--gborder);color:var(--green);font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;}
    .dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;border:none;transition:.15s;white-space:nowrap;font-family:inherit;}
    .btn-blue{background:var(--accent);color:#fff;}.btn-blue:hover{background:#2563eb;}
    .btn-ghost{background:transparent;color:#94a3b8;border:1px solid var(--border);}.btn-ghost:hover{background:#1e2235;color:var(--text);}
    .toolbar{background:#151824;border-bottom:1px solid var(--border);padding:6px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:11px;color:var(--muted);}
    .toolbar-left{display:flex;align-items:center;gap:14px;}
    .toolbar strong{color:#94a3b8;}
    .main{flex:1;display:flex;overflow:hidden;}
    .pdf-wrap{flex:1;position:relative;background:#404040;}
    .pdf-wrap iframe{width:100%;height:100%;border:none;display:block;}
    .no-pdf{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;color:var(--muted);}
    .no-pdf h2{font-size:1rem;color:#94a3b8;}
    .no-pdf p{font-size:.82rem;text-align:center;max-width:340px;line-height:1.7;}
  </style>
</head>
<body>
<header>
  <div class="h-left">
    <div class="h-title">PRO3341 – Modelagem e Otimização de Sistemas de Produção — Projeto Prático 2026</div>
    <div class="h-sub">Prof.ª Dra. Celma O. Ribeiro &nbsp;·&nbsp; Escola Politécnica – USP &nbsp;·&nbsp; 1º Semestre 2026</div>
  </div>
  <div class="h-right">
    <div class="badge"><div class="dot"></div>Atualizado automaticamente</div>
    <a href="main.pdf" download="relatorio_PRO3341_2026.pdf" class="btn btn-blue">⬇ Baixar PDF</a>
    <a href="https://github.com/jlouclaude/pro3341-po-2026" target="_blank" class="btn btn-ghost">⌥ GitHub</a>
  </div>
</header>
<div class="toolbar">
  <div class="toolbar-left">
    <div>📄 <strong>main.pdf</strong></div>
    <div>LaTeX · PRO3341 · <strong>Pesquisa Operacional</strong></div>
  </div>
  <div id="last-build" style="font-size:11px;color:var(--muted);">⏳ Verificando última compilação...</div>
</div>
<div class="main">
  <div class="pdf-wrap" id="pdf-wrap">
    <iframe id="pdf-frame" src="main.pdf#toolbar=1&navpanes=1&scrollbar=1&view=FitH" title="Relatório PRO3341" allowfullscreen></iframe>
  </div>
</div>
<script>
fetch('last_build.txt?t='+Date.now()).then(r=>r.ok?r.text():null).then(t=>{if(t)document.getElementById('last-build').textContent='🕐 '+t.split('\n')[0];}).catch(()=>{});
document.getElementById('pdf-frame').addEventListener('error',()=>{
  document.getElementById('pdf-wrap').innerHTML='<div class="no-pdf"><h2>PDF ainda não compilado</h2><p>O GitHub Actions compilará o LaTeX automaticamente no próximo push. Recarregue em instantes.</p></div>';
});
</script>
</body>
</html>
