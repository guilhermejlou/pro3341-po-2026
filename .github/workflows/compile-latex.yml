name: Compile LaTeX → PDF

on:
  push:
    branches: [main]
    paths:
      - '**.tex'
      - '**.bib'
      - 'relatorio1/**'
      - 'relatorio2/**'
      - 'relatorio3/**'
      - '.github/workflows/compile-latex.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: true
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Prepare public/
        run: |
          mkdir -p public
          cp main.pdf public/main.pdf
          echo "Compilado em $(TZ='America/Sao_Paulo' date '+%d/%m/%Y às %H:%M') (horário de Brasília) · commit $(git rev-parse --short HEAD)" \
            > public/last_build.txt
          echo "✅ PDF: $(du -h public/main.pdf | cut -f1)"

      - name: Commit PDF + build info
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: atualiza PDF compilado [skip ci]"
          file_pattern: "public/main.pdf public/last_build.txt"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
